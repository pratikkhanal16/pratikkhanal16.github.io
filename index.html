<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Surprise for My Love 🎂</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
      text-align: center;
    }
    h1 {
      font-size: 5rem;
      margin-top: 20vh;
      animation: pulse 2s infinite;
    }
    p { font-size: 1.8rem; max-width: 700px; margin: 30px auto; }
    .heart { position: absolute; font-size: 3rem; animation: float 6s infinite; opacity: 0.7; }

    @keyframes pulse { 0%,100% {transform: scale(1);} 50% {transform: scale(1.1);} }
    @keyframes float { 0% {transform: translateY(100vh);} 100% {transform: translateY(-20vh);} }
  </style>
</head>
<body>

  <h1>Happy Birthday, my love! 🎉💖</h1>
  <p>April 1st isn't just for pranks...<br>I wanted to remind you how crazy I am about you.<br>You make every day feel like a celebration. 🥰</p>
  <p>Here's to another year of us being silly together 💕<br>Love you more than yesterday, less than tomorrow.</p>

  <!-- Add your photo -->
  <!-- <img src="your-cute-photo.jpg" style="border-radius:50%; width:250px; margin:30px;"> -->

  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 400);
  </script>

</body>
</html>
